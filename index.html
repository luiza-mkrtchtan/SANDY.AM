<script>
(function() {
const gallery = document.getElementById('galleryScroll');
const dotsContainer = document.getElementById('dotIndicators');
const titleColors = document.querySelectorAll('.title-color-item');
const totalImages = document.querySelectorAll('.gallery-item').length;

// Create dots dynamically
let dotsHtml = '';
for (let i = 0; i < totalImages; i++) {
dotsHtml += `<span class="dot${i === 0 ? ' active' : ''}" data-index="${i}"></span>`;
}
dotsContainer.innerHTML = dotsHtml;

const dots = document.querySelectorAll('.dot');

function scrollToImage(index) {
if (gallery) {
gallery.scrollTo({
left: index * gallery.clientWidth,
behavior: 'smooth'
});
}
}

let scrollTimeout;
function updateActiveDot() {
if (!gallery) return;

const index = Math.round(gallery.scrollLeft / gallery.clientWidth);
const safeIndex = Math.min(Math.max(index, 0), totalImages - 1);

dots.forEach((dot, i) => {
dot.classList.toggle('active', i === safeIndex);
});
}

// Optimized scroll listener
gallery.addEventListener('scroll', () => {
if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
scrollTimeout = requestAnimationFrame(updateActiveDot);
}, { passive: true });

// Click handlers for dots
dotsContainer.addEventListener('click', (e) => {
const dot = e.target.closest('.dot');
if (dot && dot.dataset.index) {
scrollToImage(parseInt(dot.dataset.index));
}
});

// Color title click handlers
titleColors.forEach(item => {
item.addEventListener('click', () => {
const index = item.dataset.index;
if (index) {
scrollToImage(parseInt(index));
titleColors.forEach(el => el.classList.remove('active'));
item.classList.add('active');
}
});
});

// Debounced resize handler
let resizeTimeout;
window.addEventListener('resize', () => {
if (resizeTimeout) clearTimeout(resizeTimeout);
resizeTimeout = setTimeout(() => {
updateActiveDot();
}, 100);
});

// Initial update
updateActiveDot();
})();
</script>
